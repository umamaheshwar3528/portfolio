name: Sync LinkedIn → Portfolio

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  # Also allows manual run from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync/package.json

      - name: Install dependencies
        run: npm install
        working-directory: sync

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
        working-directory: sync

      - name: Scrape LinkedIn
        env:
          LINKEDIN_COOKIES:      ${{ secrets.LINKEDIN_COOKIES }}
          LINKEDIN_EMAIL:        ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:     ${{ secrets.LINKEDIN_PASSWORD }}
          LINKEDIN_PROFILE_SLUG: uma-maheshwar-reddy-manda-
        run: node scraper.js
        working-directory: sync

      - name: Update portfolio HTML
        run: node update-html.js
        working-directory: sync

      - name: Commit and push if changed
        run: |
          git config user.name  "LinkedIn Sync Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "sync: update portfolio from LinkedIn [skip ci]" && git push
